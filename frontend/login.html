<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Register — Star King Power Tools</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- AUTH CARD -->
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <img src="../images/starkinglogo2.png" alt="Star King" />
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- LOGIN TAB -->
      <div class="auth-tab-content active" id="login-tab">
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••" required />
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
          <div class="auth-link">
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
          </div>
        </form>
      </div>

      <!-- REGISTER TAB -->
      <div class="auth-tab-content" id="register-tab">
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="registerName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="registerEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="registerPhone" placeholder="+91 98765 43210" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="registerPassword" placeholder="••••••" required />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="registerConfirm" placeholder="••••••" required />
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="js/auth.js"></script>
</body>
</html>
